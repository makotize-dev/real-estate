<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <title>宅建士 想起トレーナー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bg-page: #f0f2f5;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
            --shadow-md: 0 6px 20px rgba(0,0,0,0.10);
        }
        body { font-family: 'Syne','Noto Sans JP',sans-serif; background: var(--bg-page); }
        h1,h2,h3 { font-family: 'Syne','Noto Sans JP',sans-serif; }
        .view { display:none; }
        .view.active { display:block; }
        .opt-btn {
            width:100%; text-align:left; border:1.5px solid #e2e8f0; background:#fff;
            border-radius:0.9rem; padding:0.9rem 1.1rem; font-weight:700; font-size:1rem;
            transition: all .15s ease; cursor:pointer;
        }
        .opt-btn:hover:not(:disabled) { border-color:#93c5fd; }
        .opt-btn:disabled { cursor:default; }
        .opt-btn.correct { background:#10b981; border-color:#10b981; color:#fff; }
        .opt-btn.wrong   { background:#ef4444; border-color:#ef4444; color:#fff; }
        .opt-btn.muted   { opacity:.5; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
        .fade-up { animation: fadeUp .25s ease; }
        /* 科目色 */
        .c-gyo { color:#2563eb; } .bg-gyo{ background:#2563eb; } .bd-gyo{ border-color:#2563eb; }
        .c-ken { color:#ea580c; } .bg-ken{ background:#ea580c; } .bd-ken{ border-color:#ea580c; }
        .c-hou { color:#059669; } .bg-hou{ background:#059669; } .bd-hou{ border-color:#059669; }
        .c-zei { color:#7c3aed; } .bg-zei{ background:#7c3aed; } .bd-zei{ border-color:#7c3aed; }
    </style>
</head>
<body class="text-slate-800">
<div class="max-w-2xl mx-auto px-4 py-6">

    <!-- ============ ホーム ============ -->
    <section id="view-home" class="view active">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-slate-900">宅建士 想起トレーナー</h1>
            <p class="text-sm text-slate-500 mt-1">学習済みの論点を「閉じた状態」で思い出す練習</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border p-5 mb-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-slate-700">科目を選んで開始</h2>
                <span id="total-count" class="text-xs font-bold text-slate-400"></span>
            </div>
            <div id="subject-grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 gap-3 mb-5">
            <button onclick="start('all')" class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition">全科目まぜて出題</button>
            <button id="wrong-btn" onclick="start('wrong')" class="bg-white border-2 border-red-300 text-red-600 hover:bg-red-50 font-bold py-3.5 rounded-xl transition">
                間違いだけ再テスト <span id="wrong-count" class="text-xs"></span>
            </button>
        </div>

        <div id="last-result" class="hidden bg-blue-50 border border-blue-100 rounded-xl p-4 text-sm text-blue-900 text-center mb-5"></div>

        <p class="text-xs text-slate-400 text-center leading-relaxed">
            一問一答（○×）中心。各問に根拠条文を表示。<br>
            問題は学習の進度に合わせて追加していきます（税は次回追加予定）。
        </p>
    </section>

    <!-- ============ 出題 ============ -->
    <section id="view-quiz" class="view">
        <div class="flex items-center justify-between mb-3">
            <button onclick="goHome()" class="text-xs text-slate-400 hover:text-slate-600">← 中断</button>
            <span id="q-counter" class="text-xs font-bold text-slate-500"></span>
        </div>
        <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden mb-5">
            <div id="q-progress" class="h-full bg-slate-700 transition-all duration-300" style="width:0%"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-6">
                <div class="mb-3">
                    <span id="q-subject" class="text-xs font-bold px-2.5 py-1 rounded-full"></span>
                    <span id="q-topic" class="text-xs text-slate-400 ml-1"></span>
                </div>
                <p id="q-text" class="text-lg font-bold leading-relaxed mb-6"></p>
                <div id="q-options" class="space-y-3"></div>
                <div id="q-explain" class="hidden mt-5 p-4 rounded-xl text-sm fade-up"></div>
                <div class="text-right mt-5">
                    <button id="q-next" onclick="next()" class="hidden bg-slate-900 hover:bg-slate-800 text-white font-bold px-7 py-2.5 rounded-full transition text-sm"></button>
                </div>
            </div>
        </div>
    </section>

    <!-- ============ 結果 ============ -->
    <section id="view-result" class="view">
        <div class="bg-white rounded-2xl shadow-sm border p-6 text-center mb-5">
            <p class="text-sm text-slate-500 mb-1">結果</p>
            <p id="r-score" class="text-6xl font-extrabold text-slate-900 mb-2"></p>
            <p id="r-pct" class="text-sm font-bold text-slate-500"></p>
            <div id="r-breakdown" class="mt-5 space-y-2 text-left text-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button id="r-retry-wrong" onclick="start('wrong')" class="bg-white border-2 border-red-300 text-red-600 hover:bg-red-50 font-bold py-3 rounded-xl transition text-sm">間違いだけ復習</button>
            <button onclick="goHome()" class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition text-sm">ホームへ</button>
        </div>
    </section>

</div>

<script>
/* =========================================================
   法令の e-Gov 法令単位リンク（laws.md より）
   ========================================================= */
const LAWS = {
    '宅建業法':   'https://laws.e-gov.go.jp/document?lawid=327AC1000000176',
    '民法':       'https://laws.e-gov.go.jp/document?lawid=129AC0000000089',
    '借地借家法': 'https://laws.e-gov.go.jp/document?lawid=403AC0000000090',
    '都市計画法': 'https://laws.e-gov.go.jp/document?lawid=343AC0000000100',
    '建築基準法': 'https://laws.e-gov.go.jp/document?lawid=325AC0000000201',
    '農地法':     'https://laws.e-gov.go.jp/document?lawid=327AC0000000229',
    '地方税法':   'https://laws.e-gov.go.jp/document?lawid=325AC0000000226',
    '地価公示法': 'https://laws.e-gov.go.jp/document?lawid=344AC0000000049',
};

/* 科目メタ（色・略号・study_notes リンク） */
const SUBJECTS = {
    '宅建業法':  { key:'gyo', note:'study_notes.html' },
    '権利関係':  { key:'ken', note:'study_notes.html' },
    '法令制限':  { key:'hou', note:'study_notes.html' },
    '税・その他':{ key:'zei', note:'study_notes.html' },
};

/* =========================================================
   問題バンク（すべて e-Gov 逐語確認済み）
   answer: true = 文は正しい(○) / false = 誤り(×)
   law: LAWS のキー / source: 表示する根拠条文
   ========================================================= */
const QUESTIONS = [
  // ---- 宅建業法 ----
  { id:'gyo-35-01', subject:'宅建業法', topic:'重要事項説明(35条)', law:'宅建業法', source:'宅建業法35条1項',
    q:'重要事項の説明は、契約が成立するまでの間に、宅地建物取引士が行わなければならない。',
    answer:true,
    explain:'正しい。35条1項は「契約が成立するまでの間に、宅地建物取引士をして…説明をさせなければならない」と定める。説明主体は宅建士に限られる。' },
  { id:'gyo-35-02', subject:'宅建業法', topic:'重要事項説明(35条)', law:'宅建業法', source:'宅建業法35条4項',
    q:'宅地建物取引士は、重要事項の説明をするとき、相手方から請求があった場合に限り宅地建物取引士証を提示すればよい。',
    answer:false,
    explain:'誤り。35条4項は「説明をするときは…宅地建物取引士証を提示しなければならない」。請求の有無にかかわらず提示が必要（請求があれば提示の22条の4とは別）。' },
  { id:'gyo-35-03', subject:'宅建業法', topic:'重要事項説明(35条)', law:'宅建業法', source:'宅建業法35条6項',
    q:'相手方が宅地建物取引業者である取引では、35条書面の交付は必要だが、宅地建物取引士による説明は省略できる。',
    answer:true,
    explain:'正しい。35条6項は業者間取引について、説明義務の部分を「書面を交付しなければ」と読み替え、士証提示(4項)・記名(5項)も適用しない。書面交付は必要だが説明は不要。' },
  { id:'gyo-34_2-01', subject:'宅建業法', topic:'媒介契約(34条の2)', law:'宅建業法', source:'宅建業法34条の2第3項',
    q:'専任媒介契約で有効期間を6か月と定めた場合、その特約は無効となり、期間の定めがないものとして扱われる。',
    answer:false,
    explain:'誤り。34条の2第3項は「三月を超えることができない。これより長い期間を定めたときは、その期間は、三月とする」。無効になるのではなく3か月に短縮される。' },
  { id:'gyo-34_2-02', subject:'宅建業法', topic:'媒介契約(34条の2)', law:'宅建業法', source:'宅建業法34条の2第4項',
    q:'専任媒介契約の有効期間は、依頼者の申出がなくても、業者の判断で自動的に更新できる。',
    answer:false,
    explain:'誤り。34条の2第4項は「依頼者の申出により、更新することができる」。自動更新はできず、更新後も3か月を超えられない。' },
  { id:'gyo-34_2-03', subject:'宅建業法', topic:'媒介契約(34条の2)', law:'宅建業法', source:'宅建業法34条の2第9項',
    q:'専属専任媒介契約を結んだ業者は、業務処理状況を1週間に1回以上、依頼者に報告しなければならない。',
    answer:true,
    explain:'正しい。34条の2第9項は専任媒介は2週間に1回以上、自己発見取引禁止特約付き（＝専属専任）は1週間に1回以上の報告を義務づける。' },
  { id:'gyo-3-01', subject:'宅建業法', topic:'免許(3条)', law:'宅建業法', source:'宅建業法3条1項',
    q:'2以上の都道府県の区域内に事務所を設置して宅建業を営もうとする者は、国土交通大臣の免許を受けなければならない。',
    answer:true,
    explain:'正しい。3条1項。2以上の都道府県＝国土交通大臣免許、1の都道府県のみ＝当該所在地の都道府県知事免許。事務所の所在地で決まり、取引相手の所在地では決まらない。' },
  { id:'gyo-3-02', subject:'宅建業法', topic:'免許(3条)', law:'宅建業法', source:'宅建業法3条2項',
    q:'宅地建物取引業の免許の有効期間は3年である。',
    answer:false,
    explain:'誤り。3条2項は「免許の有効期間は、五年とする」。取引士証(22条の2)の5年と混同しないこと（どちらも5年）。' },
  { id:'gyo-37-01', subject:'宅建業法', topic:'契約書面(37条)', law:'宅建業法', source:'宅建業法37条1項8号',
    q:'宅地建物取引業者が自ら売主となる売買契約で37条書面を交付する場合、損害賠償額の予定について定めがないときでも、その旨を必ず記載しなければならない。',
    answer:false,
    explain:'誤り。37条1項8号は「損害賠償額の予定又は違約金に関する定めがあるときは、その内容」＝任意的記載事項。定めがなければ記載不要。引渡しの時期(4号)・移転登記の申請の時期(5号)等の必要的記載事項とは扱いが異なる。' },
  { id:'gyo-37-02', subject:'宅建業法', topic:'契約書面(37条)', law:'宅建業法', source:'宅建業法37条2項',
    q:'建物の貸借の媒介により契約が成立した場合、宅地建物取引業者は37条書面に移転登記の申請の時期を記載しなければならない。',
    answer:false,
    explain:'誤り。37条2項は1項のうち1号・2号・4号・7号・8号・10号のみを掲げ、5号（移転登記の申請の時期）を含まない。賃貸借では所有権が移転しないため。代金(3号)は借賃(2項2号)に置き換わる。' },
  { id:'gyo-37-03', subject:'宅建業法', topic:'35条vs37条(契約書面)', law:'宅建業法', source:'宅建業法35条1項・37条1項3号',
    q:'宅地の売買において、代金の額は、35条の重要事項として説明すべき事項であり、かつ37条書面の記載事項でもある。',
    answer:false,
    explain:'誤り。代金の額は37条1項3号の記載事項（必要的）だが、35条1項には代金の額を説明する号がない（35条7号は「代金・交換差金・借賃以外に授受される金銭」のみ）。「両方」ではなく37条のみ。引渡しの時期・移転登記の申請時期も同様に37条のみ＝最頻出ひっかけ。' },
  { id:'gyo-37-04', subject:'宅建業法', topic:'35条vs37条(契約書面)', law:'宅建業法', source:'宅建業法37条3項',
    q:'宅地建物取引業者は、37条書面を交付するときは、宅地建物取引士をして、その記載内容を説明させなければならない。',
    answer:false,
    explain:'誤り。37条には説明義務の規定がない。37条3項が宅建士に求めるのは書面への「記名」のみ。内容の説明（宅建士の独占業務）は35条の重要事項説明に限られる。「37条書面も宅建士が説明」は典型的な誤り肢。' },
  { id:'gyo-38-01', subject:'宅建業法', topic:'8種制限(38条)', law:'宅建業法', source:'宅建業法38条1項',
    q:'宅地建物取引業者が自ら売主となる売買で、損害賠償額の予定も違約金も定めなかった場合、買主の債務不履行による業者の実損害が代金の10分の2を超えても、業者が請求できる損害賠償は代金の10分の2が上限となる。',
    answer:false,
    explain:'誤り。38条は損害賠償額の「予定・違約金を定めたとき」に合算額を代金の10分の2までに制限する規定。予定も違約金も定めなければ38条の射程外で、民法の原則（415・416条）により実損害を立証すれば10分の2を超えても全額請求できる。38条は「予定額」の上限であって「実際に支払われる損害賠償額」の上限ではない＝最大のひっかけ。' },
  { id:'gyo-39-01', subject:'宅建業法', topic:'8種制限(39条)', law:'宅建業法', source:'宅建業法39条2項',

    explain:'正しい。39条2項ただし書が解除を妨げるのは「その相手方が」履行に着手した後。買主自身が中間金支払いで着手していても、相手方である業者が未着手なら、買主は手付放棄で解除できる。「自分が着手したら解除できない」は誤り＝着手保護は着手した側の不測損害を防ぐ趣旨で、着手したのが自分なら相手に保護すべき期待がない。' },
  { id:'gyo-40-01', subject:'宅建業法', topic:'8種制限(40条)', law:'宅建業法', source:'宅建業法40条・民法566条',
    q:'宅地建物取引業者が自ら売主となる売買で、種類・品質の契約不適合責任について「目的物の引渡しの日から1年間に通知したものに限り責任を負う」とする特約は有効である。',
    answer:false,
    explain:'誤り。40条は、民法566条（買主が不適合を知った時から1年以内に通知）より買主に不利な特約を禁止し、例外として「引渡しの日から2年以上」とする特約のみ許す。「引渡しから1年」は2年未満で買主に不利なので無効。無効になると民法566条の原則（知った時から1年）に戻る。' },
  { id:'gyo-41-01', subject:'宅建業法', topic:'8種制限(41条の2 手付金等の保全)', law:'宅建業法', source:'宅建業法41条の2第1項',
    q:'宅地建物取引業者が自ら売主となる工事完了後（完成物件）の売買で、買主から受領しようとする手付金等が代金の額の12%（政令で定める額は超えない）である場合、業者はそのうち代金の10%を超える部分についてのみ保全措置を講じればよい。',
    answer:false,
    explain:'誤り。完成物件は手付金等が代金の10%以下かつ政令で定める額以下なら保全不要だが、これを超えると「受領しようとする手付金等の全額」について保全措置が必要（41条の2第2項・3項。41条2項も同旨）。10%は保全要否の閾値にすぎず、超過分だけの保全では足りない。なお保全措置を講じないと買主は手付金等の支払を拒める（41条の2第5項）。' },
  // ---- 権利関係 ----
  { id:'ken-107-01', subject:'権利関係', topic:'代理権の濫用(107条)', law:'民法', source:'民法107条',
    q:'代理人が自己の利益を図る目的で代理権の範囲内の行為をした場合、相手方がその目的について善意無過失であっても、その行為は無権代理とみなされる。',
    answer:false,

  { id:'ken-111-01', subject:'権利関係', topic:'代理権の消滅事由(111条)', law:'民法', source:'民法111条1項',

  { id:'ken-162-01', subject:'権利関係', topic:'取得時効(162条)', law:'民法', source:'民法162条2項',

    answer:true,
    explain:'正しい。162条2項。善意無過失なら10年、悪意または有過失なら20年（1項）。善意無過失の判定は「占有の開始の時」に行う。' },
  { id:'ken-166-01', subject:'権利関係', topic:'消滅時効(166条)', law:'民法', source:'民法166条1項',

    answer:false,
    explain:'誤り。166条1項は、主観的起算点（知った時）から5年、客観的起算点（行使できる時）から10年。「知った時から」は5年であり10年ではない。' },
  { id:'ken-177-01', subject:'権利関係', topic:'対抗要件(177条)', law:'民法', source:'民法177条',
    q:'不動産に関する物権の得喪及び変更は、登記をしなければ第三者に対抗することができない。',
    answer:true,
    explain:'正しい。177条。物権変動は意思表示で生じる(176条)が、第三者に対抗するには登記が必要。二重譲渡では先に登記した者が勝つ。' },
  { id:'ken-shakuya-01', subject:'権利関係', topic:'借家の更新(借地借家法26条)', law:'借地借家法', source:'借地借家法26条1項',
    q:'期間の定めのある建物賃貸借が法定更新された場合、更新後の契約は従前と同一の期間の定めのある契約となる。',
    answer:false,
    explain:'誤り。26条1項ただし書は「その期間は、定めがないものとする」。法定更新後は期間の定めのない建物賃貸借になる。借地の法定更新後が4条で20年/10年と期間が定まるのと異なる（頻出ひっかけ）。' },
  { id:'ken-shakuya-02', subject:'権利関係', topic:'借家の正当事由(借地借家法28条)', law:'借地借家法', source:'借地借家法28条',
    q:'建物の賃貸人による更新拒絶の通知は、賃貸人が立退料の支払を申し出れば、他の事情を考慮するまでもなく正当の事由があると認められる。',
    answer:false,
    explain:'誤り。28条。正当事由の骨格は賃貸人・賃借人（転借人を含む）双方が建物の使用を必要とする事情。立退料（財産上の給付の申出）は「のほか」以下の補完要素にすぎず、単独では正当事由を基礎づけられない。' },
  { id:'ken-shakuya-03', subject:'権利関係', topic:'造作買取請求権(借地借家法33条)', law:'借地借家法', source:'借地借家法33条・37条',
    q:'建物の賃貸借契約において、賃借人の造作買取請求権をあらかじめ排除する旨の特約は、借地借家法の強行規定に反し無効である。',
    answer:false,
    explain:'誤り。造作買取請求権(33条)は強行規定(37条＝31・34・35条のみ)に含まれない任意規定なので、排除特約は有効。借地13条の建物買取請求が強行規定で排除特約無効なのと対照的（最頻出の違い）。' },
  { id:'ken-shakuya-04', subject:'権利関係', topic:'定期借家(借地借家法38条)', law:'借地借家法', source:'借地借家法38条3項・5項',
    q:'定期建物賃貸借をしようとする賃貸人が、あらかじめ、更新がなく期間の満了により終了する旨を記載した書面を交付して説明しなかったときは、契約の更新がないこととする旨の定めは無効となる。',
    answer:true,
    explain:'正しい。38条5項。事前説明(3項)を怠ると「更新がない旨の定め」が無効となり、普通借家（更新あり・正当事由）になる。事前説明書面は1項の契約書面とは別個独立の書面が必要（判例 最判平24.9.13）。' },
  { id:'ken-kyoyu-01', subject:'権利関係', topic:'共有物の変更・管理(251・252条)', law:'民法', source:'民法251条1項・252条1項',
    q:'共有物に変更を加える行為は、その形状又は効用の著しい変更を伴わないものであっても、常に共有者全員の同意がなければすることができない。',
    answer:false,
    explain:'誤り。2021年改正で、変更のうち「形状又は効用の著しい変更を伴わないもの（軽微変更）」は251条1項の変更から除外され、252条1項の管理として持分価格の過半数で決せられる（例：砂利道のアスファルト舗装）。全員同意が必要なのは重大変更（建替え・売却等）。' },
  { id:'ken-kyoyu-02', subject:'権利関係', topic:'裁判による共有物分割(258条)', law:'民法', source:'民法258条2項・3項',
    q:'裁判による共有物の分割において、裁判所は、現物分割や賠償分割によることができる場合であっても、共有者の一人の申立てがあれば競売による分割を命じなければならない。',
    answer:false,
    explain:'誤り。258条は①現物分割／②賠償分割（債務を負担させ他の持分を取得させる＝価格賠償）を原則とし（2項）、これらの方法で分割できないとき、又は分割により価格を著しく減少させるおそれがあるときに限り競売を命じうる（3項）。競売は補充的な最後の手段で、当然に命じられるものではない。' },
  { id:'ken-souzoku-01', subject:'権利関係', topic:'代襲相続(887・939条)', law:'民法', source:'民法887条2項・939条',
    q:'被相続人の子が相続を放棄した場合、その子（被相続人の孫）が放棄した者を代襲して相続人となる。',
    answer:false,
    explain:'誤り。代襲原因（887条2項）は「相続開始以前の死亡・欠格・廃除」で、放棄は含まれない。放棄者は「初めから相続人とならなかったものとみなす」（939条）ため、その子は代襲しない。死亡・欠格・廃除は代襲するが放棄は代襲しない、が頻出の対比。' },
  { id:'ken-iryubun-01', subject:'権利関係', topic:'遺留分(1042・1046条)', law:'民法', source:'民法1042条1項・1046条1項',
    q:'被相続人の兄弟姉妹は遺留分権利者であり、遺留分を侵害された場合は侵害額に相当する金銭の支払を請求できる。',
    answer:false,
    explain:'誤り。遺留分権利者は「兄弟姉妹以外の相続人」（1042条1項）＝配偶者・子・直系尊属で、兄弟姉妹に遺留分はない。なお2018年改正で権利は金銭債権化され、遺留分権利者は侵害額に相当する金銭の支払を請求する（1046条・旧減殺請求の物権的効果＝目的物の共有から転換）。' },
  { id:'ken-kubun-01', subject:'権利関係', topic:'区分所有法 決議の定数', law:'区分所有法', source:'区分所有法62条1項・31条1項',
    q:'区分所有建物の建替え決議は、区分所有者及び議決権の各4分の3以上の多数による集会の決議で行うことができる。',
    answer:false,
    explain:'誤り。建替え決議は各「5分の4以上」（62条1項）。各4分の3以上は規約の設定変更廃止(31条1項)・共用部分の重大変更(17条1項)等の特別決議の定数。普通決議は各過半数(39条1項)。' },
  { id:'ken-fuho-01', subject:'権利関係', topic:'工作物責任(717条)', law:'民法', source:'民法717条1項',
    q:'土地の工作物の設置の瑕疵で他人に損害が生じた場合、その工作物の所有者は、損害の発生の防止に必要な注意をしていたことを証明すれば、損害賠償責任を免れる。',
    answer:false,
    explain:'誤り。717条1項で第一次的に責任を負うのは占有者で、占有者は必要な注意をしたことを立証すれば免責される（中間責任）。占有者が免責されたとき責任を負う所有者には免責規定がなく、無過失でも責任を負う（無過失責任・最後の砦）。' },
  // ---- 法令制限 ----
  { id:'hou-nochi-01', subject:'法令制限', topic:'農地法3条', law:'農地法', source:'農地法3条1項',
    q:'農地について所有権を移転する場合（農地法3条の権利移動）の許可権者は、原則として都道府県知事である。',
    answer:false,
    explain:'誤り。3条1項の許可権者は農業委員会。都道府県知事等の許可は転用(4条)・転用目的権利移動(5条)。3条＝農業委員会／4・5条＝知事等、で区別する。' },
  { id:'hou-nochi-02', subject:'法令制限', topic:'農地法3条', law:'農地法', source:'農地法3条6項',
    q:'農地法3条の許可を受けないでした農地の権利移動は、その効力を生じない。',
    answer:true,
    explain:'正しい。3条6項「第一項の許可を受けないでした行為は、その効力を生じない」。5条違反も3条6項準用で無効。4条違反は無効ではなく51条の措置命令。' },
  { id:'hou-kenchiku-01', subject:'法令制限', topic:'接道義務(建基法43条)', law:'建築基準法', source:'建築基準法43条1項',
    q:'建築物の敷地は、道路に2メートル以上接しなければならない。',
    answer:true,
    explain:'正しい。43条1項。避難・緊急車両アクセス確保が趣旨。自動車専用道路等は除外され、条例でさらに付加(3項)できる。' },
  { id:'hou-kokudo-01', subject:'法令制限', topic:'国土利用計画法 事後届出(23条)', law:'国土利用計画法', source:'国土利用計画法23条1項・2項1号',
    q:'市街化区域内において3,000㎡の土地の売買契約を締結した買主は、その契約を締結した日から起算して2週間以内に事後届出をしなければならない。',
    answer:true,
    explain:'正しい。23条2項1号イ＝市街化区域は2,000㎡以上で届出必要（3,000㎡は該当）。届出義務者は権利取得者（買主）、期間は契約締結日から2週間以内、土地所在の市町村長を経由して都道府県知事へ。' },
  { id:'hou-kokudo-02', subject:'法令制限', topic:'国土利用計画法 事後届出(23条)', law:'国土利用計画法', source:'国土利用計画法23条・47条',
    q:'事後届出をすべき土地売買契約について届出を怠った場合、その契約は無効となる。',
    answer:false,
    explain:'誤り。事後届出制は届出制であって許可制ではないため、無届出でも契約は有効。ただし47条1項で6月以下の拘禁刑又は100万円以下の罰金。規制区域の許可制(14条)で無許可契約が無効となるのと区別する。' },
  { id:'hou-kokudo-03', subject:'法令制限', topic:'国土利用計画法 勧告(24条)', law:'国土利用計画法', source:'国土利用計画法24条',
    q:'事後届出があった場合、都道府県知事は、土地の利用目的のほか、予定対価の額についても変更を勧告することができる。',
    answer:false,
    explain:'誤り。24条の勧告対象は「利用目的」のみで、対価の額（価格）は勧告できない。事後届出制は価格を審査しない（価格審査は事前届出制＝注視・監視区域の役割）。勧告は届出日から3週間以内。' },
  { id:'hou-kokudo-04', subject:'法令制限', topic:'国土利用計画法 事前届出(注視区域)', law:'国土利用計画法', source:'国土利用計画法27条の4',
    q:'注視区域内の土地について土地売買等の契約を締結しようとする場合、当事者の双方が、契約締結前にあらかじめ届け出なければならない。',
    answer:true,
    explain:'正しい。注視区域は事前届出制（27条の4）＝両当事者が契約締結前に届出。届出日から6週間は契約締結禁止。事後届出（23条＝権利取得者のみ・契約後2週間以内・価格審査なし）と区別する。' },
  { id:'hou-morido-01', subject:'法令制限', topic:'盛土規制法 許可が必要な規模', law:'盛土規制法', source:'盛土規制法施行令3条1号・2号',
    q:'宅地造成等工事規制区域内で、盛土により高さ1.5メートルの崖を生じる工事と、切土により高さ1.5メートルの崖を生じる工事は、いずれも都道府県知事の許可が必要である。',
    answer:false,
    explain:'誤り。施行令3条で、崖を生じる場合の規模は盛土＝高さ「1m超」（1号）、切土＝高さ「2m超」（2号）。盛土1.5mは1m超なので許可必要だが、切土1.5mは2m以下なので（この号では）許可不要。盛土は人工的な土で崩れやすく不安定なため基準が厳しい（1m）。盛土と切土の数値の違いが頻出ひっかけ。' },
  { id:'hou-morido-02', subject:'法令制限', topic:'盛土規制法 開発許可みなし', law:'盛土規制法', source:'盛土規制法15条2項',
    q:'宅地造成等工事規制区域内の宅地造成について、都市計画法29条の開発許可を受けた場合であっても、別途、盛土規制法に基づく都道府県知事の許可を受けなければならない。',
    answer:false,
    explain:'誤り。15条2項により、規制区域の指定後に都市計画法29条の開発許可を受けたときは、盛土規制法12条の許可を受けたものとみなされる（二重規制の回避）。「開発許可と盛土規制法の許可の両方が必要」は誤り肢。' },
  { id:'hou-bouka-01', subject:'法令制限', topic:'防火・準防火地域 内外にわたる場合', law:'建築基準法', source:'建築基準法65条2項',
    q:'1棟の建物が防火地域と準防火地域にわたる場合、防火壁で区画されていないときは、その建物全部について準防火地域内の建築物に関する規定が適用される。',
    answer:false,
    explain:'誤り。65条2項。建築物が防火地域と準防火地域にわたる場合は、その全部について厳しい方の「防火地域」内の建築物に関する規定を適用する（防火壁で区画された部分を除く）。緩い準防火を全部に適用するのではない。' },
  // ---- 税・その他 ----
  { id:'ze-koteishisan-01', subject:'税・その他', topic:'固定資産税', law:'地方税法', source:'地方税法350条',
    q:'固定資産税の標準税率は1.4%である。',
    answer:true,
    explain:'正しい。地方税法350条。1.4%は標準税率（通常用いる税率）。固定資産税は市町村税で、賦課期日（1月1日）に固定資産課税台帳に登録された所有者に課税する。' },
  { id:'ze-fudosan-01', subject:'税・その他', topic:'不動産取得税', law:'地方税法', source:'地方税法（不動産取得税）',
    q:'不動産取得税は、不動産の所在する市町村が課税する税である。',
    answer:false,
    explain:'誤り。不動産取得税は都道府県が課する税（都道府県税）。市町村が課すのは固定資産税。課税主体の取り違えは頻出ひっかけ。' },
  { id:'ze-inshi-01', subject:'税・その他', topic:'印紙税 課税文書', law:'印紙税法', source:'印紙税法別表第一',
    q:'建物の賃貸借契約書および宅地建物取引業者が作成する媒介契約書は、いずれも印紙税の課税文書ではない。',
    answer:true,
    explain:'正しい。印紙税の課税文書は別表第一の限定列挙で、建物の賃貸借契約書・媒介契約書は列挙にないため不課税。ただし土地の賃貸借契約書（権利金等の記載があるもの）は第1号文書で課税となる点に注意（土地と建物で扱いが違う）。' },
  { id:'gyo-houshu-01', subject:'宅建業法', topic:'報酬額の制限(速算式・消費税)', law:'宅建業法', source:'宅建業法46条・告示第二',
    q:'宅建業者A（課税事業者）が代金2,000万円の土地の売買を売主から媒介し成立させた。Aが売主から受け取れる報酬の上限は66万円である。',
    answer:false,
    explain:'×。速算式で2,000万×3%＋6万＝66万円は本体（税抜）。課税事業者は消費税を上乗せでき、66万×1.1＝72万6,000円が上限。告示第二の表は税込で5.5/4.4/3.3%。' },
  { id:'gyo-houshu-02', subject:'宅建業法', topic:'低廉な空家等の特例(令和6年改正)', law:'宅建業法', source:'告示第七(令和6年7月1日施行)',
    q:'低廉な空家等の売買の媒介の報酬特例の対象は、売買代金が400万円以下の宅地又は建物である。',
    answer:false,
    explain:'×。令和6年7月1日改正で対象が代金800万円以下に拡大（旧400万円以下）。媒介で依頼者から受ける上限も33万円（税込・本体30万円）に引き上げられた。' },
  { id:'ken-saiken-01', subject:'権利関係', topic:'契約解除と帰責事由(541・543条)', law:'民法', source:'民法541条・543条',
    q:'買主が代金を支払わない場合でも、その不履行について債務者（買主）に帰責事由がなければ、売主は契約を解除することができない。',
    answer:false,
    explain:'×。2017年改正で解除は「債権者を契約の拘束から解放する制度」と整理され、債務者の帰責事由は解除の要件でない。541条の催告解除も542条の無催告解除も帰責事由を要しない。ただし債権者(売主)自身の帰責事由による不履行のときは543条で解除不可。' },
  { id:'ken-saiken-02', subject:'権利関係', topic:'危険負担(536条)', law:'民法', source:'民法536条1項',
    q:'双務契約で、当事者双方の責めに帰することができない事由により債務の履行が不能となったとき、債権者は反対給付の履行を拒むことができる。',
    answer:true,
    explain:'正しい。536条1項の履行拒絶権。なお代金債務が当然に消滅するわけではなく、契約自体を解消するには542条1項1号(全部履行不能)で解除する。旧534条の債権者主義は改正で廃止。' },
  { id:'ken-keiyaku-01', subject:'権利関係', topic:'契約不適合の期間制限(566条)', law:'民法', source:'民法566条',
    q:'引き渡された土地が契約で定めた数量に不足していた場合、買主は、その不適合を知った時から1年以内にその旨を売主に通知しなければ、代金減額を請求できなくなる。',
    answer:false,
    explain:'×。566条の「知った時から1年以内の通知」は種類・品質の不適合に限られる。数量不足は566条の対象外で、一般の消滅時効（166条＝知った時から5年／行使できる時から10年）による。' },
  { id:'ken-keiyaku-02', subject:'権利関係', topic:'契約不適合と帰責事由(562・563・564条)', law:'民法', source:'民法562・563・564条',
    q:'契約不適合を理由とする買主の追完請求および代金減額請求は、売主に帰責事由がある場合にのみ認められる。',
    answer:false,
    explain:'×。追完請求(562)・代金減額請求(563)は売主の帰責事由を要しない（契約不適合という客観的事実で発生・ただし買主の帰責事由があると不可）。売主の帰責事由が必要なのは損害賠償(564→415)のみ。' },
  { id:'hou-kukaku-01', subject:'法令制限', topic:'仮換地の指定の効果', law:'土地区画整理法', source:'土地区画整理法99条1項',
    q:'仮換地の指定を受けた者は、その仮換地を使用収益できるようになるとともに、その仮換地の所有権を取得する。',
    answer:false,
    explain:'×。99条1項で移るのは使用収益の権能のみ。所有権・登記名義は従前の宅地のままで、所有権が換地に確定的に移るのは換地処分の公告があった日の翌日（104条1項）。' },
  { id:'hou-kukaku-02', subject:'法令制限', topic:'保留地の帰属', law:'土地区画整理法', source:'土地区画整理法104条11項',
    q:'土地区画整理事業の保留地は、換地処分の公告があった日の翌日において、施行者が取得する。',
    answer:true,
    explain:'正しい。104条11項。換地・清算金も含め換地処分の効果は公告の翌日に発生する（換地は従前の宅地とみなされ＝104条1項、清算金は確定＝104条8項）。' },
  { id:'gyo-gyomu-01', subject:'宅建業法', topic:'業務上の禁止(47条2号)', law:'宅建業法', source:'宅建業法47条2号',

/* =========================================================
   状態管理（localStorage に誤答を記録 → R2 誤答バンクへ発展）
   ========================================================= */
const LS_KEY = 'examv6_stats_v1';
function loadStats(){ try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ return {}; } }
function saveStats(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }
function recordResult(id, correct){
    const s = loadStats();
    if(!s[id]) s[id] = { seen:0, wrong:0, lastWrong:false };
    s[id].seen++;
    if(!correct){ s[id].wrong++; }
    s[id].lastWrong = !correct;
    saveStats(s);
}
function wrongIds(){
    const s = loadStats();
    return Object.keys(s).filter(id => s[id].lastWrong);
}

/* =========================================================
   エンジン
   ========================================================= */
let queue = [], idx = 0, score = 0, perSubject = {};

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function show(view){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+view).classList.add('active');
    window.scrollTo(0,0);
}

function renderHome(){
    const grid = document.getElementById('subject-grid');
    grid.innerHTML = '';
    let total = 0;
    Object.keys(SUBJECTS).forEach(sub=>{
        const n = QUESTIONS.filter(q=>q.subject===sub).length;
        total += n;
        const k = SUBJECTS[sub].key;
        const dis = n===0 ? 'opacity-40 cursor-not-allowed' : '';
        const onclick = n===0 ? '' : `onclick="start('subject','${sub}')"`;
        grid.innerHTML += `
          <button ${onclick} class="border-2 bd-${k} rounded-xl p-3 text-left hover:shadow-md transition ${dis}">
            <div class="font-bold c-${k}">${sub}</div>
            <div class="text-xs text-slate-400 mt-1">${n} 問</div>
          </button>`;
    });
    document.getElementById('total-count').textContent = `全 ${total} 問`;

    const w = wrongIds().length;
    document.getElementById('wrong-count').textContent = w>0 ? `（${w}問）` : '（なし）';
    document.getElementById('wrong-btn').disabled = w===0;
    if(w===0) document.getElementById('wrong-btn').classList.add('opacity-40','cursor-not-allowed');
    else document.getElementById('wrong-btn').classList.remove('opacity-40','cursor-not-allowed');
}

function start(mode, subject){
    let pool;
    if(mode==='subject') pool = QUESTIONS.filter(q=>q.subject===subject);
    else if(mode==='wrong'){ const w = wrongIds(); pool = QUESTIONS.filter(q=>w.includes(q.id)); }
    else pool = QUESTIONS.slice();
    if(pool.length===0) return;
    queue = shuffle(pool.slice());
    idx = 0; score = 0; perSubject = {};
    show('quiz');
    renderQuestion();
}

const subKey = sub => SUBJECTS[sub] ? SUBJECTS[sub].key : 'gyo';

function renderQuestion(){
    const q = queue[idx];
    document.getElementById('q-counter').textContent = `${idx+1} / ${queue.length}`;
    document.getElementById('q-progress').style.width = (idx/queue.length*100)+'%';

    const badge = document.getElementById('q-subject');
    badge.textContent = q.subject;
    badge.className = `text-xs font-bold px-2.5 py-1 rounded-full text-white bg-${subKey(q.subject)}`;
    document.getElementById('q-topic').textContent = q.topic || '';

    document.getElementById('q-text').textContent = q.q;

    const opts = document.getElementById('q-options');
    opts.innerHTML = '';
    [['○ 正しい', true], ['× 誤り', false]].forEach(([label, val])=>{
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.textContent = label;
        b.onclick = ()=>answer(val, b);
        opts.appendChild(b);
    });

    document.getElementById('q-explain').classList.add('hidden');
    document.getElementById('q-next').classList.add('hidden');
}

function answer(val, btn){
    const q = queue[idx];
    const correct = (val === q.answer);
    const buttons = document.querySelectorAll('#q-options .opt-btn');
    buttons.forEach(b=>{
        b.disabled = true;
        const isThisCorrect = (b.textContent.startsWith('○') ? true : false) === q.answer;
        if(isThisCorrect) b.classList.add('correct');
        else b.classList.add('muted');
    });
    if(!correct) btn.classList.remove('muted'), btn.classList.add('wrong');

    if(correct) score++;
    perSubject[q.subject] = perSubject[q.subject] || {c:0,n:0};
    perSubject[q.subject].n++; if(correct) perSubject[q.subject].c++;
    recordResult(q.id, correct);

    const ex = document.getElementById('q-explain');
    const noteHref = (SUBJECTS[q.subject]||{}).note || 'study_notes.html';
    const lawHref = LAWS[q.law] || '#';
    ex.className = 'mt-5 p-4 rounded-xl text-sm fade-up ' + (correct ? 'bg-emerald-50 text-emerald-900' : 'bg-red-50 text-red-900');
    ex.innerHTML = `
        <div class="font-bold mb-1">${correct ? '正解' : '不正解'}</div>
        <div class="leading-relaxed mb-3">${q.explain}</div>
        <div class="flex flex-wrap gap-3 text-xs font-bold">
            <span class="text-slate-500">根拠：${q.source}</span>
            <a href="${lawHref}" target="_blank" rel="noopener" class="text-blue-600 underline">条文(e-Gov)</a>
            <a href="${noteHref}" class="text-blue-600 underline">学習ノート</a>
        </div>`;
    ex.classList.remove('hidden');

    const nb = document.getElementById('q-next');
    nb.textContent = (idx === queue.length-1) ? '結果を見る' : '次の問題へ →';
    nb.classList.remove('hidden');
}

function next(){
    idx++;
    if(idx >= queue.length){ showResult(); return; }
    renderQuestion();
}

function showResult(){
    document.getElementById('q-progress').style.width = '100%';
    show('result');
    document.getElementById('r-score').textContent = `${score} / ${queue.length}`;
    const pct = Math.round(score/queue.length*100);
    document.getElementById('r-pct').textContent = `正答率 ${pct}%`;

    const bd = document.getElementById('r-breakdown');
    bd.innerHTML = '';
    Object.keys(perSubject).forEach(sub=>{
        const p = perSubject[sub];
        bd.innerHTML += `
          <div class="flex items-center justify-between border-b border-slate-100 pb-1">
            <span class="font-bold c-${subKey(sub)}">${sub}</span>
            <span class="text-slate-600">${p.c} / ${p.n}</span>
          </div>`;
    });

    const w = wrongIds().length;
    const rw = document.getElementById('r-retry-wrong');
    rw.disabled = w===0;
    rw.classList.toggle('opacity-40', w===0);
    rw.classList.toggle('cursor-not-allowed', w===0);

    // 直近結果をホームに表示
    localStorage.setItem('examv6_last', JSON.stringify({score, total:queue.length, at:Date.now()}));
}

function goHome(){ renderHome(); show('home'); showLast(); }

function showLast(){
    const el = document.getElementById('last-result');
    try{
        const l = JSON.parse(localStorage.getItem('examv6_last'));
        if(l){
            const d = new Date(l.at);
            el.textContent = `前回：${l.score} / ${l.total}（${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}）`;
            el.classList.remove('hidden');
        }
    }catch(e){}
}

/* 初期化 */
renderHome();
showLast();

/* PWA */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
