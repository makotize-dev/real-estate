<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>宅建士 学習ノート</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="宅建ノート">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; }

        .tab-btn {
            padding: 0.4rem 1.1rem;
            border-radius: 0.5rem;
            font-size: 0.825rem;
            font-weight: 700;
            color: #64748b;
            background: white;
            border: 1.5px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .tab-btn:hover { border-color: #93c5fd; color: #2563eb; }
        .tab-btn.active[data-subject="宅建業法"]  { background:#2563eb; color:white; border-color:#2563eb; }
        .tab-btn.active[data-subject="権利関係"]  { background:#ea580c; color:white; border-color:#ea580c; }
        .tab-btn.active[data-subject="法令制限"]  { background:#059669; color:white; border-color:#059669; }
        .tab-btn.active[data-subject="税・その他"]{ background:#7c3aed; color:white; border-color:#7c3aed; }

        /* Markdown レンダリング */
        #note-content h1 { font-size:1.5rem; font-weight:800; margin:1.5rem 0 0.75rem; color:#0f172a; border-bottom:2px solid #e2e8f0; padding-bottom:0.4rem; }
        #note-content h2 { font-size:1.15rem; font-weight:700; margin:1.5rem 0 0.5rem; color:#1e40af; }
        #note-content h3 { font-size:1rem; font-weight:700; margin:1.25rem 0 0.4rem; color:#0f172a; }
        #note-content p  { margin:0.5rem 0; line-height:1.75; }
        #note-content ul { list-style:disc; padding-left:1.5rem; margin:0.5rem 0; }
        #note-content ol { list-style:decimal; padding-left:1.5rem; margin:0.5rem 0; }
        #note-content li { margin:0.3rem 0; line-height:1.7; }
        #note-content strong { font-weight:700; color:#0f172a; }
        #note-content em { font-style:italic; color:#475569; }
        #note-content hr { border:none; border-top:1px solid #e2e8f0; margin:1.5rem 0; }
        #note-content blockquote { border-left:3px solid #93c5fd; padding-left:1rem; color:#475569; margin:0.75rem 0; }
        #note-content code { background:#f1f5f9; padding:0.1rem 0.35rem; border-radius:0.25rem; font-size:0.875rem; font-family:monospace; }
        #note-content table { width:100%; border-collapse:collapse; margin:0.75rem 0; font-size:0.875rem; }
        #note-content th { background:#f1f5f9; font-weight:700; padding:0.4rem 0.75rem; border:1px solid #e2e8f0; text-align:left; }
        #note-content td { padding:0.4rem 0.75rem; border:1px solid #e2e8f0; }
        #note-content tr:nth-child(even) td { background:#f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- ヘッダー -->
<header class="bg-slate-900 text-white px-6 py-8 text-center">
    <p class="text-slate-400 text-xs font-bold tracking-widest mb-1">宅地建物取引士 試験対策</p>
    <h1 class="text-3xl font-extrabold mb-1">学習ノート</h1>
    <p class="text-slate-400 text-sm">セッションを超えて蓄積する個人用リファレンス</p>
</header>

<!-- タブ -->
<div class="sticky top-0 z-10 bg-white border-b border-slate-200 px-4 py-3 overflow-x-auto">
    <div class="flex gap-2 min-w-max">
        <button class="tab-btn active" data-subject="宅建業法">🏠 宅建業法</button>
        <button class="tab-btn" data-subject="権利関係">⚖️ 権利関係</button>
        <button class="tab-btn" data-subject="法令制限">🏙️ 法令制限</button>
        <button class="tab-btn" data-subject="税・その他">💴 税・その他</button>
    </div>
</div>

<!-- コンテンツ -->
<main class="max-w-3xl mx-auto px-4 py-6 pb-20">
    <div id="note-content" class="bg-white rounded-2xl shadow-sm border border-slate-100 px-6 py-6"></div>
</main>

<!-- フッター -->
<footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-4 py-3 text-center text-xs text-slate-400">
    <a href="index.html" class="mr-4 hover:text-slate-600">← トップ</a>
    <a href="study_log.html" class="hover:text-slate-600">学習ログ →</a>
</footer>

<script>
const SUBJECTS = {
    '宅建業法':  'study_notes/宅建業法.md',
    '権利関係':  'study_notes/権利関係.md',
    '法令制限':  'study_notes/法令制限.md',
    '税・その他':'study_notes/税・その他.md',
};

async function loadNote(subject) {
    const el = document.getElementById('note-content');
    el.innerHTML = '<p class="text-slate-400 text-sm py-8 text-center">読み込み中...</p>';
    try {
        const res = await fetch(SUBJECTS[subject] + '?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const md = await res.text();
        el.innerHTML = marked.parse(md);
    } catch {
        el.innerHTML = '<p class="text-slate-400 text-sm py-8 text-center">まだノートがありません。</p>';
    }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadNote(btn.dataset.subject);
    });
});

loadNote('宅建業法');
</script>
</body>
</html>
